<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0A0A0F;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#F4F4F7;--text-soft:#9A9AAE;--purple:#9B5CFF;--grad:linear-gradient(120deg,#4F7CFF,#9B5CFF 45%,#FF5CAF);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px;}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(600px 400px at 50% 0%,rgba(155,92,255,.16),transparent 60%);}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:34px;text-align:center;backdrop-filter:blur(10px);}
h1{font-family:"Space Grotesk";font-size:24px;margin-bottom:22px;}
.avatar-wrap{position:relative;width:120px;height:120px;margin:0 auto 20px;}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--purple);background:var(--grad);display:grid;place-items:center;font-size:42px;font-family:"Space Grotesk";font-weight:700;color:#fff;}
.cam{position:absolute;bottom:4px;right:4px;width:38px;height:38px;border-radius:50%;background:var(--purple);border:3px solid var(--bg);display:grid;place-items:center;cursor:pointer;font-size:16px;}
label{display:block;text-align:left;font-size:13px;color:var(--text-soft);margin:16px 0 8px;}
input{width:100%;border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:12px;padding:13px;font:inherit;color:var(--text);outline:none;}
input:focus{border-color:var(--purple);}
button{width:100%;margin-top:24px;border:none;background:var(--grad);color:#fff;font-weight:600;font-size:15px;border-radius:12px;padding:14px;cursor:pointer;}
.back{display:block;margin-top:16px;color:var(--text-soft);text-decoration:none;font-size:13px;}
.msg{margin-top:14px;color:#4ade80;font-size:13px;min-height:16px;}
</style></head>
<body>
<div class="card">
  <h1>My Profile</h1>
  <div class="avatar-wrap">
    <div class="avatar" id="avatar">🙂</div>
    <label class="cam" for="photo">📷</label>
    <input type="file" id="photo" accept="image/*" hidden/>
  </div>
  <label>Display name</label>
  <input id="name" placeholder="Your name"/>
  <label>Phone</label>
  <input id="phone" disabled/>
  <button onclick="saveProfile()">Save profile</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="index.html">← Back to dashboard</a>
</div>
<script>
  if(!localStorage.getItem("userId")){location.href="login.html?next=profile.html";}
  const av=document.getElementById("avatar");
  const savedPhoto=localStorage.getItem("cc_avatar");
  const savedName=localStorage.getItem("cc_name")||"";
  if(savedPhoto){av.innerHTML=`<img src="${savedPhoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"/>`;}
  else if(savedName){av.textContent=savedName.slice(0,2).toUpperCase();}
  document.getElementById("name").value=savedName;
  document.getElementById("phone").value=localStorage.getItem("cc_phone")||"Not set";

  document.getElementById("photo").onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{localStorage.setItem("cc_avatar",r.result);av.innerHTML=`<img src="${r.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover"/>`;};
    r.readAsDataURL(f);
  };
  function saveProfile(){
    const n=document.getElementById("name").value.trim();
    if(n)localStorage.setItem("cc_name",n);
    document.getElementById("msg").textContent="Saved ✓";
  }
</script>
</body></html>
