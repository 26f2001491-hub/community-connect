<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Connect — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0A0A0F;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#F4F4F7;--text-soft:#9A9AAE;--blue:#4F7CFF;--purple:#9B5CFF;--grad:linear-gradient(120deg,#4F7CFF,#9B5CFF 45%,#FF5CAF);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px;}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(600px 400px at 50% 0%,rgba(155,92,255,.18),transparent 60%),radial-gradient(500px 400px at 50% 100%,rgba(79,124,255,.14),transparent 60%);}
    .card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;backdrop-filter:blur(10px);}
    .logo{font-family:"Space Grotesk";font-size:22px;font-weight:700;text-align:center;}
    .sub{text-align:center;color:var(--text-soft);font-size:14px;margin:8px 0 26px;}
    label{font-size:13px;color:var(--text-soft);display:block;margin:16px 0 8px;font-weight:500;}
    input{width:100%;padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;}
    input:focus{border-color:var(--purple);}
    button{width:100%;margin-top:20px;padding:14px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 6px 24px rgba(79,124,255,.35);}
    button:hover{transform:translateY(-1px);}
    button:disabled{opacity:.5;cursor:not-allowed;}
    .msg{text-align:center;font-size:13px;margin-top:16px;min-height:18px;font-weight:500;}
    .msg.ok{color:#4ade80;}.msg.err{color:#f87171;}
    .hint{text-align:center;font-size:12px;color:var(--text-soft);margin-top:10px;}
    .hidden{display:none;}
    .link{text-align:center;margin-top:18px;}
    .link a{color:var(--blue);font-size:13px;text-decoration:none;font-weight:500;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌐 Community Connect</div>
    <div class="sub">Log in to join events & chat</div>

    <div id="step-phone">
      <label>Phone number (with country code)</label>
      <input id="phone" type="tel" placeholder="+91 98765 43210" />
      <button id="sendBtn">Send OTP</button>
      <div class="hint">OTP will be sent via SMS to your phone</div>
    </div>

    <div id="step-otp" class="hidden">
      <label>Enter OTP</label>
      <input id="otp" type="text" inputmode="numeric" placeholder="6-digit code" maxlength="6" />
      <button id="verifyBtn">Verify & Continue</button>
      <div class="hint" id="resend-hint">
        Didn't receive? <a href="#" id="resendBtn" style="color:var(--blue)">Resend OTP</a>
      </div>
    </div>

    <div class="msg" id="msg"></div>
    <div class="link"><a href="index.html">Skip → browse events</a></div>
  </div>

  <script>
    const API = "https://community-connect-mt7r.onrender.com/api/v1";
    const msg = document.getElementById("msg");
    const setMsg = (t, ok) => { msg.textContent = t; msg.className = "msg " + (ok ? "ok" : "err"); };
    const next = new URLSearchParams(location.search).get("next") || "index.html";

    async function sendOtp() {
      const phone = document.getElementById("phone").value.trim();
      if (!phone) return setMsg("Phone number daalo (+91 se shuru)", false);
      if (!phone.startsWith("+")) return setMsg("Country code zaroori hai — jaise +91 98765 43210", false);

      const btn = document.getElementById("sendBtn");
      btn.disabled = true; btn.textContent = "Sending…";
      setMsg("", true);

      try {
        const res = await fetch(`${API}/auth/otp/send`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Failed");

        setMsg("✓ OTP sent! Check your SMS", true);
        document.getElementById("step-phone").classList.add("hidden");
        document.getElementById("step-otp").classList.remove("hidden");
        document.getElementById("otp").focus();
      } catch (e) {
        setMsg(e.message || "Server se connect nahi ho paya", false);
        btn.disabled = false; btn.textContent = "Send OTP";
      }
    }

    document.getElementById("sendBtn").onclick = sendOtp;
    document.getElementById("resendBtn").onclick = async (e) => {
      e.preventDefault();
      document.getElementById("step-otp").classList.add("hidden");
      document.getElementById("step-phone").classList.remove("hidden");
      const btn = document.getElementById("sendBtn");
      btn.disabled = false; btn.textContent = "Send OTP";
      setMsg("", true);
    };

    document.getElementById("verifyBtn").onclick = async () => {
      const phone = document.getElementById("phone").value.trim();
      const otp = document.getElementById("otp").value.trim();
      if (otp.length !== 6) return setMsg("6-digit OTP daalo", false);

      const btn = document.getElementById("verifyBtn");
      btn.disabled = true; btn.textContent = "Verifying…";

      try {
        const res = await fetch(`${API}/auth/otp/verify`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, otp }),
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.detail || "Invalid OTP");

        localStorage.setItem("accessToken", json.data.accessToken);
        localStorage.setItem("userId", json.data.userId);
        localStorage.setItem("cc_phone", phone);
        setMsg("✓ Logged in! Redirecting…", true);
        setTimeout(() => location.href = decodeURIComponent(next), 700);
      } catch (e) {
        setMsg(e.message || "Invalid OTP — try again", false);
        btn.disabled = false; btn.textContent = "Verify & Continue";
      }
    };

    // Enter key support
    document.getElementById("phone").addEventListener("keydown", e => { if (e.key === "Enter") sendOtp(); });
    document.getElementById("otp").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("verifyBtn").click(); });
  </script>
</body>
</html>
