<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host an Event — Community Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0A0A0F;--surface:rgba(255,255,255,.04);--surface-2:rgba(255,255,255,.06);--border:rgba(255,255,255,.08);--text:#F4F4F7;--text-soft:#9A9AAE;--blue:#4F7CFF;--purple:#9B5CFF;--grad:linear-gradient(120deg,#4F7CFF,#9B5CFF 45%,#FF5CAF);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(600px 400px at 20% 0%,rgba(79,124,255,.15),transparent 60%),radial-gradient(600px 400px at 80% 100%,rgba(255,92,175,.12),transparent 60%);}
    h1{font-family:"Space Grotesk";}
    header{background:rgba(10,10,15,.6);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    header .b{display:flex;align-items:center;gap:12px;font-family:"Space Grotesk";font-weight:700;font-size:19px;}
    header .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:16px;}
    header a{color:var(--text-soft);font-weight:600;text-decoration:none;font-size:14px;}
    .wrap{max-width:520px;margin:36px auto;padding:0 16px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:34px;backdrop-filter:blur(10px);}
    .card h1{font-size:26px;margin-bottom:4px;}
    .card .sub{color:var(--text-soft);font-weight:500;margin-bottom:24px;}
    label{display:block;font-size:13px;font-weight:500;color:var(--text-soft);margin:16px 0 8px;}
    input,select{width:100%;border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:12px;padding:13px 14px;font:inherit;color:var(--text);outline:none;}
    input:focus,select:focus{border-color:var(--purple);}
    select option{background:#12121A;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    button{width:100%;margin-top:24px;border:none;background:var(--grad);color:#fff;font-family:"Inter";font-weight:600;font-size:16px;border-radius:12px;padding:14px;cursor:pointer;box-shadow:0 6px 24px rgba(79,124,255,.3);}
    button:hover{transform:translateY(-1px);}
    .loc-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);margin-top:10px;padding:11px;font-size:13px;box-shadow:none;}
    .msg{text-align:center;margin-top:16px;font-weight:600;font-size:14px;min-height:18px;}
    .msg.ok{color:#4ade80;}.msg.err{color:#f87171;}
  </style>
</head>
<body>
  <header>
    <div class="b"><span class="logo">🌐</span> Community Connect</div>
    <a href="index.html">← Dashboard</a>
  </header>

  <div class="wrap">
    <div class="card">
      <h1>Host an event 🎉</h1>
      <div class="sub">Apne aas-paas logon ko bulao</div>

      <label>Event title</label>
      <input id="title" placeholder="Chai & Code Meetup" />

      <label>Category</label>
      <select id="category">
        <option value="coffee">☕ Coffee</option>
        <option value="party">🎉 Party</option>
        <option value="sport">⚽ Sport</option>
        <option value="movie">🎬 Movie</option>
        <option value="music">🎵 Music</option>
        <option value="business">💼 Business</option>
        <option value="other">✨ Other</option>
      </select>

      <label>When</label>
      <input id="starts_at" type="datetime-local" />

      <div class="row">
        <div><label>Latitude</label><input id="lat" type="number" step="any" value="28.6139" /></div>
        <div><label>Longitude</label><input id="lng" type="number" step="any" value="77.2090" /></div>
      </div>
      <button class="loc-btn" onclick="useMyLocation()">📍 Use my current location</button>

      <button onclick="PublishEvent()">Publish event</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const API = "https://community-connect-mt7r.onrender.com/api/v1";
    const msg = document.getElementById("msg");
    const setMsg = (t, ok) => { msg.textContent = t; msg.className = "msg " + (ok ? "ok" : "err"); };

    function useMyLocation() {
      navigator.geolocation?.getCurrentPosition(p => {
        document.getElementById("lat").value = p.coords.latitude.toFixed(6);
        document.getElementById("lng").value = p.coords.longitude.toFixed(6);
        setMsg("Location set ✓", true);
      }, () => setMsg("Location access denied", false));
    }

    async function PublishEvent() {
      const userId = localStorage.getItem("userId");
      if (!userId) {                       // login zaroori — wapas host pe aao
        setMsg("Pehle login karo…", false);
        setTimeout(() => location.href = "login.html?next=host.html", 800);
        return;
      }
      const title = document.getElementById("title").value.trim();
      const starts = document.getElementById("starts_at").value;
      if (!title || !starts) return setMsg("Title aur time bharo", false);

      const body = {
        host_id: userId, title,
        category: document.getElementById("category").value,
        lat: parseFloat(document.getElementById("lat").value),
        lng: parseFloat(document.getElementById("lng").value),
        starts_at: new Date(starts).toISOString(),
      };
      try {
        const res = await fetch(`${API}/events`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) { const t = await res.text(); throw new Error(t); }
        setMsg("Event published ✓ redirecting…", true);
        setTimeout(() => location.href = "index.html", 1000);
      } catch (e) {
        setMsg("Couldn't publish — " + (e.message || "is backend running?"), false);
      }
    }
  </script>
</body>
</html>
